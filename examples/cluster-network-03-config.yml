# Copy to manifests/cluster-network-03-config.yml after running:
#   openshift-install create manifests --dir .
#
# Set hybridClusterNetwork.cidr to a range that does NOT overlap with
# networking.clusterNetwork in your backed-up install-config.yaml.
# Example: clusterNetwork 10.128.0.0/14 -> hybridClusterNetwork 10.132.0.0/14
#
# Do not set hybridOverlayVXLANPort on Azure (vSphere only).

apiVersion: operator.openshift.io/v1
kind: Network
metadata:
  name: cluster
spec:
  defaultNetwork:
    ovnKubernetesConfig:
      hybridOverlayConfig:
        hybridClusterNetwork:
        - cidr: 10.132.0.0/14
          hostPrefix: 23

featureSet: CustomNoUpgrade
featureGates: ["AzureClusterHostedDNSInstall=true"]
baseDomain: development.techcorp.com
metadata:
  name: mycluster
networking:
  networkType: OVNKubernetes
  clusterNetwork:
  - cidr: 10.128.0.0/14
    hostPrefix: 23
platform:
  azure:
    region: eastus
    baseDomainResourceGroupName: dummy-dns-rg
    userProvisionedDNS: Enabled

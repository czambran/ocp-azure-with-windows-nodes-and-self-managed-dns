# Windows Machine Config Operator (WMCO) — OLM install prerequisites + Subscription
#
# Apply in order (or apply this single file — resources are ordered):
#   oc apply -f wmco-subscription.yaml
#
# Requires: Red Hat OpenShift support for Windows Containers subscription
# Docs: https://docs.redhat.com/en/documentation/openshift_container_platform/latest/html/windows_container_support_for_openshift/enabling-windows-container-workloads
#
# Disconnected cluster: change spec.source to your mirrored CatalogSource name.

---
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-windows-machine-config-operator
  labels:
    openshift.io/cluster-monitoring: "true"

---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: windows-machine-config-operator
  namespace: openshift-windows-machine-config-operator
spec:
  targetNamespaces:
    - openshift-windows-machine-config-operator

---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: windows-machine-config-operator
  namespace: openshift-windows-machine-config-operator
spec:
  channel: stable
  installPlanApproval: Automatic # Set to Manual if you want to approve the install plan manually
  name: windows-machine-config-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  # Optional: pin a specific CSV version (uncomment and set from `oc get packagemanifest windows-machine-config-operator -o yaml`)
  #startingCSV: windows-machine-config-operator.v10.21.1